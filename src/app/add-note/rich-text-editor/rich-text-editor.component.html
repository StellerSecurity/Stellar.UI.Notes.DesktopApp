<div class="editor-container" #editorWrapper style="overflow-y: hidden;">
  <angular-editor #editorRef
    [config]="editorConfig"
    [(ngModel)]="note_text"
    (ngModelChange)="onContentChange($event)"
    (click)="onClickEditor()"
    (keydown)="onClickEditor()"
    (focusin)="onEditorFocusIn()"
    (focusout)="onEditorFocusOut()">
  </angular-editor>
</div>
